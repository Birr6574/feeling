<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>페이지를 찾을 수 없어요 - 감정 체크인</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1b1730; color: #efeaff;
      text-align: center; padding: 24px;
    }
    .box { max-width: 420px; }
    .emoji { font-size: 64px; line-height: 1; }
    h1 { font-size: 28px; margin: 16px 0 8px; }
    p { color: #b9b0d8; line-height: 1.6; margin: 0 0 24px; }
    a {
      display: inline-block; padding: 12px 24px; border-radius: 12px;
      background: #7c5cff; color: #fff; text-decoration: none; font-weight: 700;
    }
    a:hover { background: #6a4af0; }
  </style>
</head>
<body>
  <div class="box">
    <div class="emoji">💜</div>
    <h1>페이지를 찾을 수 없어요</h1>
    <p>주소가 바뀌었거나 삭제된 페이지일 수 있어요.<br>아래 버튼을 눌러 처음으로 돌아가 주세요.</p>
    <a href="/">감정 체크인 홈으로</a>
  </div>
</body>
</html>
